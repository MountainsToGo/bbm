<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bogus Basin Interactive Maps</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='sky' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23667eea;stop-opacity:1'/%3E%3Cstop offset='100%25' style='stop-color:%23764ba2;stop-opacity:1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect fill='url(%23sky)' width='64' height='64'/%3E%3Cpath fill='%235a67d8' d='M0 64 L20 30 L45 64 Z'/%3E%3Cpath fill='%236b7bb8' d='M15 64 L32 15 L55 64 Z'/%3E%3Cpath fill='%23ffffff' d='M32 15 L28 25 L32 22 L36 25 Z'/%3E%3Cpath fill='%23e0e7ff' d='M28 25 L32 22 L36 25 L40 35 L32 30 L24 35 Z'/%3E%3Cpath fill='%238b9dc3' d='M35 64 L48 35 L64 64 Z'/%3E%3Cpath fill='%23ffffff' d='M48 35 L46 40 L48 38 L50 40 Z'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        h1 { font-size: 2.2em; margin-bottom: 10px; }
        .subtitle { font-size: 1.1em; color: #94a3b8; margin-bottom: 40px; }
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            padding: 40px 30px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }
        .card-winter {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-summer {
            background: linear-gradient(135deg, #34d399 0%, #059669 100%);
        }
        .card-icon { font-size: 3em; }
        .card-title { font-size: 1.4em; font-weight: 700; }
        .card-desc { font-size: 0.9em; opacity: 0.85; }
        @media (max-width: 500px) {
            .cards { grid-template-columns: 1fr; }
            h1 { font-size: 1.6em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏔️ Bogus Basin Interactive Maps</h1>
        <p class="subtitle">Select a season to explore</p>
        <div class="cards">
            <a href="Winter/learn.html" class="card card-winter">
                <span class="card-icon">⛷️</span>
                <span class="card-title">Winter Map</span>
                <span class="card-desc">Ski runs, lifts & mountain tour</span>
            </a>
            <a href="Summer/learn.html" class="card card-summer">
                <span class="card-icon">🥾</span>
                <span class="card-title">Summer Map</span>
                <span class="card-desc">Multi-use trail network</span>
            </a>
        </div>
    </div>
</body>
</html>
